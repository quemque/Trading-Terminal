version: '3.8'

services:
   backend:
      build:
         context: ./backend
         dockerfile: Dockerfile
      container_name: trading-backend
      ports:
         - '${PORT}:${PORT}'
         - '8080:8080'
      environment:
         - PORT=${PORT}
         - API_URL=${API_URL}
         - API_KEY=${API_KEY}
         - NODE_ENV=development
      volumes:
         - ./backend:/app
         - /app/node_modules
      networks:
         - trading-network
      restart: unless-stopped

   frontend:
      build:
         context: ./frontend
         dockerfile: Dockerfile
      container_name: trading-frontend
      ports:
         - '5173:5173'
      environment:
         - VITE_API_URL=http://localhost:${PORT}
      volumes:
         - ./frontend:/app
         - /app/node_modules
      depends_on:
         - backend
      networks:
         - trading-network
      restart: unless-stopped

networks:
   trading-network:
      driver: bridge
